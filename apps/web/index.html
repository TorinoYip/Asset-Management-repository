<!doctype html>
<html lang="zh-CN"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="风电、储能与分布式资产管理看板">
  <title>Asset Intellgent</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="主导航">
      <a class="brand" href="#overview" aria-label="返回资产看板">
        <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
        <span><strong>Asset Intellgent</strong><small>ASSET MANAGEMENT</small></span>
      </a>

      <div class="context-chip"><span></span> MONTHLY ASSET VIEW</div>

      <nav class="primary-nav">
        <a class="nav-item" href="#overview" data-route-link="overview">
          <span class="nav-index">01</span><span>资产看板<small>Portfolio overview</small></span>
        </a>
        <a class="nav-item" href="#revenue" data-route-link="revenue">
          <span class="nav-index">02</span><span>营收总览<small>Business summary</small></span>
        </a>
        <a class="nav-item" href="#types" data-route-link="types">
          <span class="nav-index">03</span><span>按类型分析<small>Peer comparison</small></span>
        </a>
        <a class="nav-item" href="#stations" data-route-link="stations">
          <span class="nav-index">04</span><span>按站点分析<small>Station detail</small></span>
        </a>
        <a class="nav-item" href="#mengxi" data-route-link="mengxi">
          <span class="nav-index">05</span><span>蒙西日报<small>Daily report</small></span>
        </a>
      </nav>

      <div class="sidebar-foot">
        <p>ASSET MANAGEMENT</p>
        <span>月度管理视图<br>经营与运营透视</span>
      </div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <div class="mobile-brand">Asset Intellgent</div>
        <div class="filter-set" aria-label="全局筛选">
          <label>统计期
            <select id="monthFilter">
              <option value="2025-07">截至 2025 年 7 月</option>
              <option value="2025-06">截至 2025 年 6 月</option>
            </select>
          </label>
          <label>省份
            <select id="provinceFilter">
              <option value="all">全部省份</option>
              <option value="hebei">河北省</option>
              <option value="inner-mongolia">内蒙古</option>
              <option value="shandong">山东省</option>
              <option value="zhejiang">浙江省</option>
            </select>
          </label>
          <label id="stationFilterWrap">电站
            <select id="stationFilter">
              <option value="all">全部电站</option>
            </select>
          </label>
          <label>资产类型
            <select id="assetFilter">
              <option value="wind">风电</option>
              <option value="storage">储能</option>
              <option value="distributed">分布式</option>
            </select>
          </label>
        </div>
        <div class="freshness"><span></span> 数据更新于 08:30</div>
      </header>

      <main id="mainContent"></main>

      <footer class="app-footer"><span>Asset Intellgent · Monthly portfolio view</span><span>内部管理视图 · 示例架构</span></footer>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  


<script src="src/core/bootstrap.js" defer=""></script><script src="src/pages/overview.template.js" defer=""></script><script src="src/pages/revenue.template.js" defer=""></script><script src="src/pages/types.template.js" defer=""></script><script src="src/pages/stations.template.js" defer=""></script><script src="src/pages/mengxi.template.js" defer=""></script><script src="src/data/portfolio.js" defer=""></script><script src="src/shared/ui.js" defer=""></script><script src="src/domain/portfolio.js" defer=""></script><script src="src/core/router.js" defer=""></script><script src="src/pages/overview.js" defer=""></script><script src="src/pages/revenue.js" defer=""></script><script src="src/pages/types.js" defer=""></script><script src="src/pages/stations.js" defer=""></script><script src="src/pages/mengxi.js" defer=""></script><script src="src/core/events.js" defer=""></script><script src="src/main.js" defer=""></script></body></html>
